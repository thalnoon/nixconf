# Auto-generated by Matugen
<* if {{ is_dark_mode }} *>
set -g status-bg                          "{{colors.background.default.hex}}"
set -gq @thm_bar_bg                       "{{colors.background.default.hex}}"

set -gq @thm_bg                           "{{colors.background.default.hex}}"
<* else *>
set -g status-bg                          "{{colors.surface_variant.default.hex}}"
set -gq @thm_bar_bg                       "{{colors.surface_variant.default.hex}}"

set -gq @thm_bg                           "{{colors.surface_variant.default.hex}}"
<* endif *>

set -gq @thm_fg                           "{{colors.on_surface.default.hex}}"
set -gq @thm_primary                      "{{colors.primary.default.hex}}"
set -gq @thm_inverse_primary              "{{colors.inverse_primary.default.hex}}"
set -gq @thm_surface_low                  "{{colors.surface_container_low.default.hex}}"
set -gq @thm_surface                      "{{colors.surface_container.default.hex}}"
set -gq @thm_surface_variant              "{{colors.surface_container_high.default.hex}}"
set -gq @thm_outline                      "{{colors.outline_variant.default.hex}}"
set -gq @thm_text_variant                 "{{colors.on_surface_variant.default.hex}}"

# Configure Tmux
set -g status-position top
set -g status-style                       "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g status-justify "right"
set -g window-active-style                "bg=default"
set -g window-style                       "bg=default"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_inverse_primary},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_primary}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_outline},none]│"
set -g @max_dir_width "$(($(tput cols) - 40))"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_text_variant}]  #{=/#{@max_dir_width}:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_outline},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_inverse_primary}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_outline}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_primary}] 󰖩 on ,#[fg=#{@thm_inverse_primary},bold]#[reverse] 󰖪 off }"

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_text_variant}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -g window-status-activity-style "bg=#{@thm_inverse_primary},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_inverse_primary},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_outline}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_primary},fg=#{@thm_bg},bold"
